<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard – Pakistan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            color: #e6edf3;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 820px;
            width: 100%;
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px 28px;
            box-shadow: 0 25px 50px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(48, 54, 61, 0.4);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e6edf3;
            font-size: 15px;
            outline: none;
            min-width: 180px;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
        }
        .search-box button {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(46,160,67,0.3);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .unit-toggle {
            display: flex;
            gap: 6px;
            background: #0d1117;
            padding: 4px;
            border-radius: 30px;
            border: 1px solid #30363d;
        }
        .unit-toggle button {
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .unit-toggle button.active {
            background: #2ea043;
            color: white;
        }
        .favorites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .favorites button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .favorites button:hover {
            background: #30363d;
        }
        .current {
            background: #0d1117;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .current-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .current-left .icon {
            font-size: 64px;
            line-height: 1;
        }
        .current-temp {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }
        .current-city {
            font-size: 24px;
            font-weight: 600;
        }
        .current-desc {
            color: #8b949e;
            font-size: 16px;
            text-transform: capitalize;
        }
        .feels-like {
            font-size: 14px;
            color: #8b949e;
            margin-top: 4px;
        }
        .feels-like span {
            color: #e6edf3;
            font-weight: 500;
        }
        .current-right {
            text-align: right;
            color: #8b949e;
            font-size: 14px;
            line-height: 1.8;
        }
        .current-right span {
            color: #e6edf3;
            font-weight: 500;
        }
        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .forecast-day {
            background: #0d1117;
            border-radius: 16px;
            padding: 15px 8px;
            text-align: center;
            border: 1px solid #21262d;
            transition: 0.2s;
        }
        .forecast-day:hover {
            border-color: #30363d;
            transform: translateY(-2px);
        }
        .forecast-day .day {
            font-size: 14px;
            font-weight: 600;
        }
        .forecast-day .icon {
            font-size: 32px;
            margin: 6px 0;
        }
        .forecast-day .temp {
            font-size: 18px;
            font-weight: 700;
        }
        .forecast-day .desc {
            font-size: 12px;
            color: #8b949e;
            text-transform: capitalize;
        }
        .forecast-day .precip {
            font-size: 11px;
            color: #58a6ff;
        }
        .error {
            color: #f85149;
            background: rgba(248,81,73,0.1);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(248,81,73,0.2);
            margin-top: 15px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .loading {
            text-align: center;
            padding: 30px 0;
            color: #8b949e;
        }
        .loading::after {
            content: '...';
            animation: dots 1.2s steps(4) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        @media (max-width: 600px) {
            .app { padding: 20px 16px; }
            .current { flex-direction: column; align-items: flex-start; gap: 15px; }
            .current-right { text-align: left; width: 100%; }
            .current-temp { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city..." />
                <button id="searchBtn">Search</button>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <div class="unit-toggle">
                <button id="unitC" class="active">°C</button>
                <button id="unitF">°F</button>
            </div>
            <div class="favorites" id="favoritesContainer">
                <!-- Favorites injected here -->
            </div>
        </div>

        <!-- CURRENT WEATHER -->
        <div id="currentWeather" class="current">
            <div class="current-left">
                <div class="icon" id="weatherIcon">☀️</div>
                <div>
                    <div class="current-temp" id="temperature">--°C</div>
                    <div class="current-city" id="cityName">Loading...</div>
                    <div class="current-desc" id="weatherDesc">--</div>
                    <div class="feels-like">Feels like: <span id="feelsLike">--</span></div>
                </div>
            </div>
            <div class="current-right">
                <div>💧 Humidity: <span id="humidity">--</span>%</div>
                <div>💨 Wind: <span id="windSpeed">--</span> <span id="windUnit">km/h</span></div>
                <div>🌅 Sunrise: <span id="sunrise">--</span></div>
                <div>🌇 Sunset: <span id="sunset">--</span></div>
                <div>☀️ UV Index: <span id="uvIndex">--</span></div>
            </div>
        </div>

        <!-- FORECAST -->
        <h3 style="margin: 20px 0 12px; font-weight:500;">5-Day Forecast</h3>
        <div class="forecast" id="forecastContainer">
            <!-- Forecast cards injected here -->
        </div>

        <!-- ERROR -->
        <div class="error" id="errorMessage"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION – NO API KEY NEEDED (Open-Meteo)
        // ============================================================
        const DEFAULT_LAT = 26.2442;
        const DEFAULT_LON = 68.4037;
        const DEFAULT_CITY = 'Nawabshah';

        // ============================================================
        // STATE
        // ============================================================
        let currentCity = DEFAULT_CITY;
        let currentLat = DEFAULT_LAT;
        let currentLon = DEFAULT_LON;
        let unit = 'metric';    // 'metric' or 'imperial'
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || ['Nawabshah', 'Karachi', 'Lahore', 'Islamabad'];

        // ============================================================
        // DOM REFS
        // ============================================================
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const unitC = document.getElementById('unitC');
        const unitF = document.getElementById('unitF');
        const favoritesContainer = document.getElementById('favoritesContainer');
        const errorDiv = document.getElementById('errorMessage');

        const weatherIcon = document.getElementById('weatherIcon');
        const temperature = document.getElementById('temperature');
        const cityName = document.getElementById('cityName');
        const weatherDesc = document.getElementById('weatherDesc');
        const feelsLike = document.getElementById('feelsLike');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const windUnit = document.getElementById('windUnit');
        const sunrise = document.getElementById('sunrise');
        const sunset = document.getElementById('sunset');
        const uvIndex = document.getElementById('uvIndex');
        const forecastContainer = document.getElementById('forecastContainer');

        // ============================================================
        // HELPERS
        // ============================================================
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function getUnitSymbol() {
            return unit === 'metric' ? '°C' : '°F';
        }

        function getWindUnit() {
            return unit === 'metric' ? 'km/h' : 'mph';
        }

        function convertTemp(celsius) {
            if (unit === 'metric') return Math.round(celsius);
            else return Math.round(celsius * 9/5 + 32);
        }

        // Heat index (feels-like) using Rothfusz formula (simplified)
        function computeHeatIndex(tempC, humidityPercent) {
            if (tempC < 20) return tempC; // no significant heat index
            const T = tempC * 1.8 + 32; // to Fahrenheit
            const RH = humidityPercent;
            // Rothfusz regression
            const HI = -42.379 + 2.04901523*T + 10.14333127*RH - 0.22475541*T*RH 
                    - 0.00683783*T*T - 0.05481717*RH*RH + 0.00122874*T*T*RH 
                    + 0.00085282*T*RH*RH - 0.00000199*T*T*RH*RH;
            let hiF = HI;
            // Adjustments if RH < 13% and T between 80-112°F
            if (RH < 13 && T > 80 && T < 112) {
                hiF = HI - ((13 - RH) * 0.25);
            }
            // Adjust if RH > 85% and T between 80-87°F
            if (RH > 85 && T > 80 && T < 87) {
                hiF = HI + ((RH - 85) * 0.1);
            }
            const hiC = (hiF - 32) * 5/9;
            return Math.round(hiC);
        }

        function formatTime(unixTime) {
            const d = new Date(unixTime * 1000);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // ============================================================
        // CITY COORDINATE LOOKUP (Open-Meteo Geocoding – free)
        // ============================================================
        async function getCoordinates(city) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Geocoding failed');
            const data = await res.json();
            if (!data.results || data.results.length === 0) {
                throw new Error(`City "${city}" not found`);
            }
            const result = data.results[0];
            return {
                lat: result.latitude,
                lon: result.longitude,
                name: result.name,
                country: result.country
            };
        }

        // ============================================================
        // WEATHER FETCH (Open-Meteo)
        // ============================================================
        async function fetchWeather(lat, lon) {
            // Current weather + hourly for humidity + daily for forecast, UV, sunrise/sunset
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_probability_max&timezone=auto&forecast_days=7`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather data fetch failed');
            const data = await res.json();
            return data;
        }

        // ============================================================
        // WEATHER CODE TO ICON & DESCRIPTION
        // ============================================================
        function getWeatherInfo(code) {
            const map = {
                0: { icon: '☀️', desc: 'Clear sky' },
                1: { icon: '🌤️', desc: 'Mainly clear' },
                2: { icon: '⛅', desc: 'Partly cloudy' },
                3: { icon: '☁️', desc: 'Overcast' },
                45: { icon: '🌫️', desc: 'Fog' },
                48: { icon: '🌫️', desc: 'Depositing rime fog' },
                51: { icon: '🌦️', desc: 'Light drizzle' },
                53: { icon: '🌧️', desc: 'Moderate drizzle' },
                55: { icon: '🌧️', desc: 'Dense drizzle' },
                61: { icon: '🌧️', desc: 'Light rain' },
                63: { icon: '🌧️', desc: 'Moderate rain' },
                65: { icon: '🌧️', desc: 'Heavy rain' },
                71: { icon: '🌨️', desc: 'Light snow' },
                73: { icon: '🌨️', desc: 'Moderate snow' },
                75: { icon: '🌨️', desc: 'Heavy snow' },
                80: { icon: '🌦️', desc: 'Rain showers' },
                81: { icon: '🌦️', desc: 'Moderate showers' },
                82: { icon: '🌧️', desc: 'Violent showers' },
                95: { icon: '⛈️', desc: 'Thunderstorm' },
                96: { icon: '⛈️', desc: 'Thunderstorm with hail' },
                99: { icon: '⛈️', desc: 'Thunderstorm with heavy hail' },
            };
            return map[code] || { icon: '❓', desc: 'Unknown' };
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderWeather(data, cityNameStr) {
            const current = data.current_weather;
            const hourly = data.hourly;
            const daily = data.daily;

            // Get current hour index
            const now = new Date();
            const currentHour = now.getHours();
            // Find the closest hour in the hourly array
            let hourIndex = 0;
            for (let i = 0; i < hourly.time.length; i++) {
                const h = new Date(hourly.time[i]);
                if (h.getHours() === currentHour) {
                    hourIndex = i;
                    break;
                }
            }

            // Humidity from hourly
            const humidityVal = hourly.relativehumidity_2m ? hourly.relativehumidity_2m[hourIndex] : '--';
            humidity.textContent = humidityVal !== '--' ? Math.round(humidityVal) : '--';

            // Temperature
            const tempC = current.temperature;
            const temp = convertTemp(tempC);
            temperature.textContent = `${temp}${getUnitSymbol()}`;

            // City name
            cityName.textContent = cityNameStr;

            // Weather description & icon
            const weather = getWeatherInfo(current.weathercode);
            weatherDesc.textContent = weather.desc;
            weatherIcon.textContent = weather.icon;

            // Feels-like / heat index
            if (humidityVal !== '--' && tempC) {
                const hi = computeHeatIndex(tempC, humidityVal);
                feelsLike.textContent = `${hi}${getUnitSymbol()}`;
            } else {
                feelsLike.textContent = `${temp}${getUnitSymbol()}`;
            }

            // Wind speed
            const windMs = current.windspeed;
            const wind = unit === 'metric' ? windMs * 3.6 : windMs * 2.237;
            windSpeed.textContent = Math.round(wind);
            windUnit.textContent = getWindUnit();

            // Sunrise/Sunset (from daily)
            if (daily.sunrise && daily.sunrise.length > 0) {
                const rise = new Date(daily.sunrise[0]).getTime() / 1000;
                const set = new Date(daily.sunset[0]).getTime() / 1000;
                sunrise.textContent = formatTime(rise);
                sunset.textContent = formatTime(set);
            } else {
                sunrise.textContent = '--';
                sunset.textContent = '--';
            }

            // UV Index (daily max)
            if (daily.uv_index_max && daily.uv_index_max.length > 0) {
                uvIndex.textContent = daily.uv_index_max[0].toFixed(1);
            } else {
                uvIndex.textContent = '--';
            }

            // Forecast (days 1-5)
            forecastContainer.innerHTML = '';
            for (let i = 1; i < Math.min(daily.time.length, 6); i++) {
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const maxC = daily.temperature_2m_max[i];
                const minC = daily.temperature_2m_min[i];
                const max = convertTemp(maxC);
                const min = convertTemp(minC);
                const code = daily.weathercode[i];
                const info = getWeatherInfo(code);
                const precip = daily.precipitation_probability_max ? daily.precipitation_probability_max[i] : 0;

                const card = document.createElement('div');
                card.className = 'forecast-day';
                card.innerHTML = `
                    <div class="day">${dayName}</div>
                    <div class="icon">${info.icon}</div>
                    <div class="temp">${max}${getUnitSymbol()} / ${min}${getUnitSymbol()}</div>
                    <div class="desc">${info.desc}</div>
                    <div class="precip">${precip}% rain</div>
                `;
                forecastContainer.appendChild(card);
            }
        }

        // ============================================================
        // MAIN UPDATE
        // ============================================================
        async function updateWeather(cityName) {
            try {
                const geo = await getCoordinates(cityName);
                currentLat = geo.lat;
                currentLon = geo.lon;
                currentCity = geo.name;

                const weatherData = await fetchWeather(currentLat, currentLon);
                renderWeather(weatherData, currentCity);

                localStorage.setItem('lastCity', currentCity);
                cityInput.value = currentCity;

            } catch (err) {
                showError(err.message || 'Failed to fetch weather');
            }
        }

        // ============================================================
        // FAVORITES
        // ============================================================
        function renderFavorites() {
            favoritesContainer.innerHTML = '';
            if (favorites.length === 0) {
                const empty = document.createElement('span');
                empty.textContent = '⭐ Add favorites';
                empty.style.color = '#8b949e';
                empty.style.fontSize = '13px';
                favoritesContainer.appendChild(empty);
                return;
            }
            favorites.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city;
                btn.addEventListener('click', () => {
                    cityInput.value = city;
                    updateWeather(city);
                });
                favoritesContainer.appendChild(btn);
            });
        }

        function addFavorite(city) {
            if (!favorites.includes(city)) {
                favorites.push(city);
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) updateWeather(city);
        });
        cityInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        unitC.addEventListener('click', () => {
            unit = 'metric';
            unitC.classList.add('active');
            unitF.classList.remove('active');
            updateWeather(currentCity);
        });
        unitF.addEventListener('click', () => {
            unit = 'imperial';
            unitF.classList.add('active');
            unitC.classList.remove('active');
            updateWeather(currentCity);
        });

        cityName.addEventListener('dblclick', () => {
            const city = cityName.textContent;
            if (city && city !== 'Loading...') {
                addFavorite(city);
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        const lastCity = localStorage.getItem('lastCity') || DEFAULT_CITY;
        cityInput.value = lastCity;
        renderFavorites();
        updateWeather(lastCity);

        console.log('🌤️ Weather Dashboard ready (Open-Meteo)');
    </script>
</body>
</html>
