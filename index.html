<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard – Pakistan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            color: #e6edf3;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 820px;
            width: 100%;
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px 28px;
            box-shadow: 0 25px 50px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(48, 54, 61, 0.4);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e6edf3;
            font-size: 15px;
            outline: none;
            min-width: 180px;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
        }
        .search-box button {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(46,160,67,0.3);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .unit-toggle {
            display: flex;
            gap: 6px;
            background: #0d1117;
            padding: 4px;
            border-radius: 30px;
            border: 1px solid #30363d;
        }
        .unit-toggle button {
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .unit-toggle button.active {
            background: #2ea043;
            color: white;
        }
        .favorites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .favorites button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .favorites button:hover {
            background: #30363d;
        }
        .current {
            background: #0d1117;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .current-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .current-left img {
            width: 80px;
            height: 80px;
        }
        .current-temp {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }
        .current-city {
            font-size: 24px;
            font-weight: 600;
        }
        .current-desc {
            color: #8b949e;
            font-size: 16px;
            text-transform: capitalize;
        }
        .current-right {
            text-align: right;
            color: #8b949e;
            font-size: 14px;
            line-height: 1.6;
        }
        .current-right span {
            color: #e6edf3;
            font-weight: 500;
        }
        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .forecast-day {
            background: #0d1117;
            border-radius: 16px;
            padding: 15px 8px;
            text-align: center;
            border: 1px solid #21262d;
            transition: 0.2s;
        }
        .forecast-day:hover {
            border-color: #30363d;
            transform: translateY(-2px);
        }
        .forecast-day img {
            width: 50px;
            height: 50px;
        }
        .forecast-day .day {
            font-size: 14px;
            font-weight: 600;
        }
        .forecast-day .temp {
            font-size: 18px;
            font-weight: 700;
        }
        .forecast-day .desc {
            font-size: 12px;
            color: #8b949e;
            text-transform: capitalize;
        }
        .error {
            color: #f85149;
            background: rgba(248,81,73,0.1);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(248,81,73,0.2);
            margin-top: 15px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .loading {
            text-align: center;
            padding: 30px 0;
            color: #8b949e;
        }
        .loading::after {
            content: '...';
            animation: dots 1.2s steps(4) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        @media (max-width: 600px) {
            .app { padding: 20px 16px; }
            .current { flex-direction: column; align-items: flex-start; gap: 15px; }
            .current-right { text-align: left; width: 100%; }
            .current-temp { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city..." />
                <button id="searchBtn">Search</button>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <div class="unit-toggle">
                <button id="unitC" class="active">°C</button>
                <button id="unitF">°F</button>
            </div>
            <div class="favorites" id="favoritesContainer">
                <!-- Favorites injected here -->
            </div>
        </div>

        <!-- CURRENT WEATHER -->
        <div id="currentWeather" class="current">
            <div class="current-left">
                <img id="weatherIcon" src="" alt="weather icon" />
                <div>
                    <div class="current-temp" id="temperature">--°C</div>
                    <div class="current-city" id="cityName">Loading...</div>
                    <div class="current-desc" id="weatherDesc">--</div>
                </div>
            </div>
            <div class="current-right">
                <div>💧 Humidity: <span id="humidity">--</span>%</div>
                <div>💨 Wind: <span id="windSpeed">--</span> km/h</div>
                <div>🌅 Sunrise: <span id="sunrise">--</span></div>
                <div>🌇 Sunset: <span id="sunset">--</span></div>
            </div>
        </div>

        <!-- FORECAST -->
        <h3 style="margin: 20px 0 12px; font-weight:500;">5-Day Forecast</h3>
        <div class="forecast" id="forecastContainer">
            <!-- Forecast cards injected here -->
        </div>

        <!-- ERROR -->
        <div class="error" id="errorMessage"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION – NO API KEY NEEDED (uses Open-Meteo)
        // ============================================================
        // Coordinates for Nawabshah, Pakistan (default)
        const DEFAULT_LAT = 26.2442;
        const DEFAULT_LON = 68.4037;
        const DEFAULT_CITY = 'Nawabshah';

        // ============================================================
        // STATE
        // ============================================================
        let currentCity = DEFAULT_CITY;
        let currentLat = DEFAULT_LAT;
        let currentLon = DEFAULT_LON;
        let unit = 'metric';    // 'metric' for °C, 'imperial' for °F
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || ['Nawabshah', 'Karachi', 'Lahore', 'Islamabad'];

        // ============================================================
        // DOM REFS
        // ============================================================
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const unitC = document.getElementById('unitC');
        const unitF = document.getElementById('unitF');
        const favoritesContainer = document.getElementById('favoritesContainer');
        const errorDiv = document.getElementById('errorMessage');

        const weatherIcon = document.getElementById('weatherIcon');
        const temperature = document.getElementById('temperature');
        const cityName = document.getElementById('cityName');
        const weatherDesc = document.getElementById('weatherDesc');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const sunrise = document.getElementById('sunrise');
        const sunset = document.getElementById('sunset');
        const forecastContainer = document.getElementById('forecastContainer');

        // ============================================================
        // HELPERS
        // ============================================================
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function getUnitSymbol() {
            return unit === 'metric' ? '°C' : '°F';
        }

        function getWindUnit() {
            return unit === 'metric' ? 'km/h' : 'mph';
        }

        // Convert temperature from Celsius to target unit
        function convertTemp(celsius) {
            if (unit === 'metric') return Math.round(celsius);
            else return Math.round(celsius * 9/5 + 32);
        }

        // Format time (HH:MM) from Unix timestamp
        function formatTime(unixTime) {
            const d = new Date(unixTime * 1000);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // ============================================================
        // CITY COORDINATE LOOKUP (using Open-Meteo Geocoding – free)
        // ============================================================
        async function getCoordinates(city) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Geocoding failed');
            const data = await res.json();
            if (!data.results || data.results.length === 0) {
                throw new Error(`City "${city}" not found`);
            }
            const result = data.results[0];
            return {
                lat: result.latitude,
                lon: result.longitude,
                name: result.name,
                country: result.country
            };
        }

        // ============================================================
        // WEATHER FETCH (Open-Meteo)
        // ============================================================
        async function fetchWeather(lat, lon) {
            // Current weather + daily forecast (7 days) + sunrise/sunset
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&forecast_days=7`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather data fetch failed');
            const data = await res.json();
            return data;
        }

        // ============================================================
        // WEATHER CODE TO ICON & DESCRIPTION
        // ============================================================
        function getWeatherInfo(code) {
            // WMO Weather interpretation codes (https://open-meteo.com/en/docs)
            const map = {
                0: { icon: '☀️', desc: 'Clear sky' },
                1: { icon: '🌤️', desc: 'Mainly clear' },
                2: { icon: '⛅', desc: 'Partly cloudy' },
                3: { icon: '☁️', desc: 'Overcast' },
                45: { icon: '🌫️', desc: 'Fog' },
                48: { icon: '🌫️', desc: 'Depositing rime fog' },
                51: { icon: '🌦️', desc: 'Light drizzle' },
                53: { icon: '🌧️', desc: 'Moderate drizzle' },
                55: { icon: '🌧️', desc: 'Dense drizzle' },
                61: { icon: '🌧️', desc: 'Light rain' },
                63: { icon: '🌧️', desc: 'Moderate rain' },
                65: { icon: '🌧️', desc: 'Heavy rain' },
                71: { icon: '🌨️', desc: 'Light snow' },
                73: { icon: '🌨️', desc: 'Moderate snow' },
                75: { icon: '🌨️', desc: 'Heavy snow' },
                80: { icon: '🌦️', desc: 'Rain showers' },
                81: { icon: '🌦️', desc: 'Moderate showers' },
                82: { icon: '🌧️', desc: 'Violent showers' },
                95: { icon: '⛈️', desc: 'Thunderstorm' },
                96: { icon: '⛈️', desc: 'Thunderstorm with hail' },
                99: { icon: '⛈️', desc: 'Thunderstorm with heavy hail' },
            };
            return map[code] || { icon: '❓', desc: 'Unknown' };
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderWeather(data, cityNameStr) {
            const current = data.current_weather;
            const daily = data.daily;

            // Current temperature
            const tempC = current.temperature;
            const temp = convertTemp(tempC);
            temperature.textContent = `${temp}${getUnitSymbol()}`;

            // City name
            cityName.textContent = cityNameStr;

            // Weather description & icon
            const weather = getWeatherInfo(current.weathercode);
            weatherDesc.textContent = weather.desc;
            weatherIcon.textContent = weather.icon; // using emoji instead of image
            weatherIcon.style.fontSize = '64px';
            weatherIcon.src = ''; // clear any src

            // Humidity (not provided by current_weather, we use daily average? skip for now)
            humidity.textContent = '--'; // Open-Meteo current doesn't provide humidity directly

            // Wind speed (convert from m/s to km/h or mph)
            const windMs = current.windspeed;
            const wind = unit === 'metric' ? windMs * 3.6 : windMs * 2.237;
            windSpeed.textContent = `${Math.round(wind)} ${getWindUnit()}`;

            // Sunrise/Sunset (from daily)
            if (daily.sunrise && daily.sunrise.length > 0) {
                const rise = new Date(daily.sunrise[0]).getTime() / 1000;
                const set = new Date(daily.sunset[0]).getTime() / 1000;
                sunrise.textContent = formatTime(rise);
                sunset.textContent = formatTime(set);
            } else {
                sunrise.textContent = '--';
                sunset.textContent = '--';
            }

            // Forecast (daily)
            forecastContainer.innerHTML = '';
            // We only show 5 days (skip today if desired, but we'll show all)
            for (let i = 1; i < Math.min(daily.time.length, 6); i++) {
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const maxC = daily.temperature_2m_max[i];
                const minC = daily.temperature_2m_min[i];
                const max = convertTemp(maxC);
                const min = convertTemp(minC);
                const code = daily.weathercode[i];
                const info = getWeatherInfo(code);

                const card = document.createElement('div');
                card.className = 'forecast-day';
                card.innerHTML = `
                    <div class="day">${dayName}</div>
                    <div style="font-size:28px;">${info.icon}</div>
                    <div class="temp">${max}${getUnitSymbol()} / ${min}${getUnitSymbol()}</div>
                    <div class="desc">${info.desc}</div>
                `;
                forecastContainer.appendChild(card);
            }
        }

        // ============================================================
        // MAIN UPDATE
        // ============================================================
        async function updateWeather(cityName) {
            try {
                // Get coordinates
                const geo = await getCoordinates(cityName);
                currentLat = geo.lat;
                currentLon = geo.lon;
                currentCity = geo.name; // use official name

                // Fetch weather
                const weatherData = await fetchWeather(currentLat, currentLon);
                renderWeather(weatherData, currentCity);

                // Save last searched city
                localStorage.setItem('lastCity', currentCity);
                cityInput.value = currentCity;

                // Update favorites (if not already in list, we'll add automatically?)
                // We'll let user double-click to add.

            } catch (err) {
                showError(err.message || 'Failed to fetch weather');
            }
        }

        // ============================================================
        // FAVORITES
        // ============================================================
        function renderFavorites() {
            favoritesContainer.innerHTML = '';
            if (favorites.length === 0) {
                const empty = document.createElement('span');
                empty.textContent = '⭐ Add favorites';
                empty.style.color = '#8b949e';
                empty.style.fontSize = '13px';
                favoritesContainer.appendChild(empty);
                return;
            }
            favorites.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city;
                btn.addEventListener('click', () => {
                    cityInput.value = city;
                    updateWeather(city);
                });
                favoritesContainer.appendChild(btn);
            });
        }

        function addFavorite(city) {
            if (!favorites.includes(city)) {
                favorites.push(city);
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        // Search
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) updateWeather(city);
        });
        cityInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        // Unit toggle
        unitC.addEventListener('click', () => {
            unit = 'metric';
            unitC.classList.add('active');
            unitF.classList.remove('active');
            updateWeather(currentCity);
        });
        unitF.addEventListener('click', () => {
            unit = 'imperial';
            unitF.classList.add('active');
            unitC.classList.remove('active');
            updateWeather(currentCity);
        });

        // Add favorite (double-click on city name)
        cityName.addEventListener('dblclick', () => {
            const city = cityName.textContent;
            if (city && city !== 'Loading...') {
                addFavorite(city);
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        // Load last city or default to Nawabshah
        const lastCity = localStorage.getItem('lastCity') || DEFAULT_CITY;
        cityInput.value = lastCity;
        renderFavorites();
        updateWeather(lastCity);

        console.log('🌤️ Weather Dashboard ready (Open-Meteo)');
        console.log('💡 Double-click city name to add to favorites.');
    </script>
</body>
</html>
