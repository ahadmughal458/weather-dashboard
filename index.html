<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            color: #e6edf3;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 800px;
            width: 100%;
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px 28px;
            box-shadow: 0 25px 50px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(48, 54, 61, 0.4);
        }

        /* ----- HEADER ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e6edf3;
            font-size: 15px;
            outline: none;
            min-width: 180px;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
        }
        .search-box button {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(46,160,67,0.3);
        }

        /* ----- UNIT TOGGLE & FAVORITES ----- */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .unit-toggle {
            display: flex;
            gap: 6px;
            background: #0d1117;
            padding: 4px;
            border-radius: 30px;
            border: 1px solid #30363d;
        }
        .unit-toggle button {
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .unit-toggle button.active {
            background: #2ea043;
            color: white;
        }
        .favorites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .favorites button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .favorites button:hover {
            background: #30363d;
        }

        /* ----- CURRENT WEATHER ----- */
        .current {
            background: #0d1117;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .current-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .current-left img {
            width: 80px;
            height: 80px;
        }
        .current-temp {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }
        .current-city {
            font-size: 24px;
            font-weight: 600;
        }
        .current-desc {
            color: #8b949e;
            font-size: 16px;
            text-transform: capitalize;
        }
        .current-right {
            text-align: right;
            color: #8b949e;
            font-size: 14px;
            line-height: 1.6;
        }
        .current-right span {
            color: #e6edf3;
            font-weight: 500;
        }

        /* ----- FORECAST ----- */
        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .forecast-day {
            background: #0d1117;
            border-radius: 16px;
            padding: 15px 8px;
            text-align: center;
            border: 1px solid #21262d;
            transition: 0.2s;
        }
        .forecast-day:hover {
            border-color: #30363d;
            transform: translateY(-2px);
        }
        .forecast-day img {
            width: 50px;
            height: 50px;
        }
        .forecast-day .day {
            font-size: 14px;
            font-weight: 600;
        }
        .forecast-day .temp {
            font-size: 18px;
            font-weight: 700;
        }
        .forecast-day .desc {
            font-size: 12px;
            color: #8b949e;
            text-transform: capitalize;
        }

        /* ----- ERROR & LOADING ----- */
        .error {
            color: #f85149;
            background: rgba(248,81,73,0.1);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(248,81,73,0.2);
            margin-top: 15px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .loading {
            text-align: center;
            padding: 30px 0;
            color: #8b949e;
        }
        .loading::after {
            content: '...';
            animation: dots 1.2s steps(4) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 600px) {
            .app { padding: 20px 16px; }
            .current { flex-direction: column; align-items: flex-start; gap: 15px; }
            .current-right { text-align: left; width: 100%; }
            .current-temp { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city..." />
                <button id="searchBtn">Search</button>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <div class="unit-toggle">
                <button id="unitC" class="active">°C</button>
                <button id="unitF">°F</button>
            </div>
            <div class="favorites" id="favoritesContainer">
                <!-- Favorites will be injected here -->
            </div>
        </div>

        <!-- CURRENT WEATHER -->
        <div id="currentWeather" class="current">
            <div class="current-left">
                <img id="weatherIcon" src="" alt="weather icon" />
                <div>
                    <div class="current-temp" id="temperature">--°C</div>
                    <div class="current-city" id="cityName">Loading...</div>
                    <div class="current-desc" id="weatherDesc">--</div>
                </div>
            </div>
            <div class="current-right">
                <div>💧 Humidity: <span id="humidity">--</span>%</div>
                <div>💨 Wind: <span id="windSpeed">--</span> km/h</div>
                <div>☀️ UV Index: <span id="uvIndex">--</span></div>
            </div>
        </div>

        <!-- FORECAST -->
        <h3 style="margin: 20px 0 12px; font-weight:500;">5-Day Forecast</h3>
        <div class="forecast" id="forecastContainer">
            <!-- Forecast cards injected here -->
        </div>

        <!-- ERROR -->
        <div class="error" id="errorMessage"></div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        // 🔑 GET YOUR FREE API KEY: https://openweathermap.org/api
        const API_KEY = 'YOUR_API_KEY'; // <-- Replace with your key
        const BASE_URL = 'https://api.openweathermap.org/data/2.5/';

        // ============================================================
        // STATE
        // ============================================================
        let currentCity = 'London';
        let unit = 'metric';    // 'metric' for °C, 'imperial' for °F
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        // ============================================================
        // DOM REFS
        // ============================================================
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const unitC = document.getElementById('unitC');
        const unitF = document.getElementById('unitF');
        const favoritesContainer = document.getElementById('favoritesContainer');
        const errorDiv = document.getElementById('errorMessage');

        const weatherIcon = document.getElementById('weatherIcon');
        const temperature = document.getElementById('temperature');
        const cityName = document.getElementById('cityName');
        const weatherDesc = document.getElementById('weatherDesc');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const uvIndex = document.getElementById('uvIndex');
        const forecastContainer = document.getElementById('forecastContainer');

        // ============================================================
        // HELPERS
        // ============================================================
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function getUnitSymbol() {
            return unit === 'metric' ? '°C' : '°F';
        }

        function getWindUnit() {
            return unit === 'metric' ? 'km/h' : 'mph';
        }

        // Convert Kelvin to target unit
        function convertTemp(kelvin) {
            if (unit === 'metric') return Math.round(kelvin - 273.15);
            else return Math.round((kelvin - 273.15) * 9/5 + 32);
        }

        // Format date for forecast
        function formatDate(timestamp) {
            const d = new Date(timestamp * 1000);
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        // ============================================================
        // API CALLS
        // ============================================================
        async function fetchWeather(city) {
            try {
                // Current weather
                const currentRes = await fetch(
                    `${BASE_URL}weather?q=${city}&appid=${API_KEY}`
                );
                if (!currentRes.ok) throw new Error('City not found');
                const currentData = await currentRes.json();

                // 5-day forecast
                const forecastRes = await fetch(
                    `${BASE_URL}forecast?q=${city}&appid=${API_KEY}`
                );
                if (!forecastRes.ok) throw new Error('Forecast not available');
                const forecastData = await forecastRes.json();

                // UV Index (requires lat/lon)
                const { lat, lon } = currentData.coord;
                const uvRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`
                );
                let uv = '--';
                if (uvRes.ok) {
                    const uvData = await uvRes.json();
                    uv = uvData.value;
                }

                return { current: currentData, forecast: forecastData, uv };
            } catch (err) {
                throw err;
            }
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderWeather(data) {
            const { current, forecast, uv } = data;

            // Current
            const tempKelvin = current.main.temp;
            const temp = convertTemp(tempKelvin);
            temperature.textContent = `${temp}${getUnitSymbol()}`;
            cityName.textContent = current.name;
            weatherDesc.textContent = current.weather[0].description;
            humidity.textContent = current.main.humidity;
            windSpeed.textContent = `${Math.round(current.wind.speed * (unit === 'metric' ? 3.6 : 2.237))} ${getWindUnit()}`;
            uvIndex.textContent = uv;

            // Icon
            const iconCode = current.weather[0].icon;
            weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;
            weatherIcon.alt = current.weather[0].description;

            // Forecast (filter every 24h, take 5 days)
            const dailyForecasts = forecast.list.filter((item, index) => index % 8 === 0).slice(0, 5);
            forecastContainer.innerHTML = '';
            dailyForecasts.forEach(day => {
                const date = new Date(day.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const tempDay = convertTemp(day.main.temp);
                const icon = day.weather[0].icon;
                const desc = day.weather[0].description;

                const card = document.createElement('div');
                card.className = 'forecast-day';
                card.innerHTML = `
                    <div class="day">${dayName}</div>
                    <img src="https://openweathermap.org/img/wn/${icon}@2x.png" alt="${desc}" />
                    <div class="temp">${tempDay}${getUnitSymbol()}</div>
                    <div class="desc">${desc}</div>
                `;
                forecastContainer.appendChild(card);
            });
        }

        // ============================================================
        // MAIN UPDATE
        // ============================================================
        async function updateWeather(city) {
            try {
                const data = await fetchWeather(city);
                renderWeather(data);
                currentCity = city;
                // Save last searched city
                localStorage.setItem('lastCity', city);
            } catch (err) {
                showError(err.message || 'Failed to fetch weather');
                // Keep previous data visible, but show error
            }
        }

        // ============================================================
        // FAVORITES
        // ============================================================
        function renderFavorites() {
            favoritesContainer.innerHTML = '';
            if (favorites.length === 0) {
                const empty = document.createElement('span');
                empty.textContent = '⭐ Add favorites';
                empty.style.color = '#8b949e';
                empty.style.fontSize = '13px';
                favoritesContainer.appendChild(empty);
                return;
            }
            favorites.forEach(city => {
                const btn = document.createElement('button');
                btn.textContent = city;
                btn.addEventListener('click', () => {
                    cityInput.value = city;
                    updateWeather(city);
                });
                favoritesContainer.appendChild(btn);
            });
        }

        function addFavorite(city) {
            if (!favorites.includes(city)) {
                favorites.push(city);
                localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        // Search
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) updateWeather(city);
        });
        cityInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        // Unit toggle
        unitC.addEventListener('click', () => {
            unit = 'metric';
            unitC.classList.add('active');
            unitF.classList.remove('active');
            updateWeather(currentCity);
        });
        unitF.addEventListener('click', () => {
            unit = 'imperial';
            unitF.classList.add('active');
            unitC.classList.remove('active');
            updateWeather(currentCity);
        });

        // Add favorite (double-click on city name)
        cityName.addEventListener('dblclick', () => {
            const city = cityName.textContent;
            if (city && city !== 'Loading...') {
                addFavorite(city);
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        // Load last city
        const lastCity = localStorage.getItem('lastCity') || 'London';
        cityInput.value = lastCity;
        renderFavorites();
        updateWeather(lastCity);

        console.log('🌤️ Weather Dashboard ready!');
        console.log('💡 Double-click city name to add to favorites.');
    </script>
</body>
</html>
